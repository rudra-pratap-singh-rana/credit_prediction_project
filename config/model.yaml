model_selection:
    model:
      XGBClassifier:
        search_param_grid:
          max_depth:
           - 5
          n_estimators:
           - 10
         
      GradientBoostingClassifier:
        search_param_grid:
          n_estimators:
           - 50
          criterion:
           - friedman_mse

      RandomForestClassifier:
        search_param_grid:
          n_estimators:
           - 50
          max_depth:
           - 5
          min_samples_split:
           - 2
          min_samples_leaf:
           - 1
